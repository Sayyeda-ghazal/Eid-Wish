<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eid Mubarak Wish Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene">
      <div class="glow"></div>
      <section class="card">
        <header class="card__header">
          <p class="badge">Eid Greetings</p>
          <h1>Eid Mubarak</h1>
          <p class="subtitle">May your days be filled with light, love, and generous blessings.</p>
        </header>

        <div class="card__center">
          <div class="moon">
            <div class="moon__cut"></div>
          </div>
          <div class="lantern">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="stars">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <footer class="card__footer">
          <p>Wishing you peace, prosperity, and a heart full of joy.</p>
          <p class="signature">With warm wishes, <span>Your Name</span></p>
        </footer>
      </section>
    </main>
  </body>
</html>
